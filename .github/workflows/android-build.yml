name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build APK
        run: |
          npx expo prebuild --platform android --clean
          cd android
          ./gradlew assembleDebug

      - name: Find and Rename APK
        run: |
          mkdir -p final-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk final-apk/rasidi-app.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rasidi-app
          path: final-apk/rasidi-app.apk
